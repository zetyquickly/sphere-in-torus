<!DOCTYPE html>
<head>
   <meta charset="utf-8">
   <meta http-equiv="X-UA-Compatible" content="IE=edge">
   <title>WebGPU Step-by-Step 49</title>
   <meta name="description" content="">
   <meta name="viewport" content="width=device-width, initial-scale=1">
 </head>

<body>
   <div class="grid">
      <div class="item1">
         <h1>Sphere in Torus</h1>
         <br>
         <label for="major-radius">Major radius (R): <span id="major-radius-val">2.5</span></label><br>
         <input id="major-radius" type="range" min="1" max="4" step="0.1" value="2.5" style="width:80%"><br><br>
         <label for="tube-radius">Tube radius (r): <span id="tube-radius-val">0.3</span></label><br>
         <input id="tube-radius" type="range" min="0.1" max="0.8" step="0.05" value="0.3" style="width:80%"><br><br>
         <label for="sphere-radius">Sphere radius: <span id="sphere-radius-val">0.14</span></label><br>
         <input id="sphere-radius" type="range" min="0.01" max="0.25" step="0.01" value="0.14" style="width:80%"><br><br>
         <label for="tumble-speed">Tumble speed: <span id="tumble-speed-val">0.003</span></label><br>
         <input id="tumble-speed" type="range" min="0" max="0.05" step="0.001" value="0.003" style="width:80%"><br>
         <small><i>Rate at which the torus rotation axis shifts each frame</i></small><br><br>
<label for="friction">Friction (μ): <span id="friction-val">0.01</span></label><br>
         <input id="friction" type="range" min="0" max="1" step="0.01" value="0.01" style="width:80%"><br>
         <small><i>How much spin the wall imparts on each collision; 0 = frictionless</i></small>
      </div>
      <div class="item2">
         <canvas id="canvas-webgpu"></canvas>
      </div>
   </div>
   <script src="main.bundle.js"></script>
</body>
</html>
